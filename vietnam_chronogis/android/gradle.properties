org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=768m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
# Han che RAM tren may 16GB dang chay emulator: tat daemon thuong tru,
# khong build song song nhieu module cung luc.
org.gradle.daemon=false
org.gradle.workers.max=2
org.gradle.parallel=false
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Tat incremental compilation cua Kotlin: tranh loi "different roots" khi
# project (o D:) va Pub Cache (o C:) nam khac o dia tren Windows.
kotlin.incremental=false
